spring.application.name=oneDayClass
server.port=8080

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.hiddenmethod.filter.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8
spring.messages.encoding=UTF-8

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:onedayclassdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
# Jasypt 사용 예시:
# 1) 평문 DB 비밀번호를 암호화한 뒤 아래처럼 ENC(...) 값만 남깁니다.
#    spring.datasource.password=ENC(암호화된_DB_비밀번호)
# 2) 실제 DB로 바꿀 때는 URL/계정도 필요하면 같은 방식으로 암호화할 수 있습니다.
#    spring.datasource.url=ENC(암호화된_DB_URL)
#    spring.datasource.username=ENC(암호화된_DB_계정)
# 3) 마스터키는 이 파일에 쓰지 말고 JVM 속성으로 전달합니다.
#    java -Djasypt.encryptor.password=마스터키 -jar target/oneDayClass-0.0.1-SNAPSHOT.jar
#    mvn spring-boot:run "-Dspring-boot.run.jvmArguments=-Djasypt.encryptor.password=마스터키"
spring.sql.init.mode=always
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jasypt 암복호화 설정입니다. 암호문을 만들 때도 이 설정과 같은 조건을 사용해야 합니다.
# jasypt.encryptor.password 값은 JVM 속성이나 환경변수(JASYPT_ENCRYPTOR_PASSWORD)로만 전달합니다.
jasypt.encryptor.algorithm=PBEWITHHMACSHA512ANDAES_256
jasypt.encryptor.key-obtention-iterations=1000
jasypt.encryptor.pool-size=1
jasypt.encryptor.provider-name=SunJCE
jasypt.encryptor.salt-generator-classname=org.jasypt.salt.RandomSaltGenerator
jasypt.encryptor.iv-generator-classname=org.jasypt.iv.RandomIvGenerator
jasypt.encryptor.string-output-type=base64

# 커스텀 비밀번호 사용 예시:
# app.ssh.password=ENC(암호화된_SSH_비밀번호)
# 코드에서는 SshSecretProperties.password 필드로 주입받으면 이미 복호화된 평문이 들어옵니다.

mybatis.type-aliases-package=com.example.onedayclass
mybatis.mapper-locations=classpath:/mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=30MB
app.upload.dir=uploads
